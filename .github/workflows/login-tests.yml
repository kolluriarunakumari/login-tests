# ============================================================
# GitHub Actions Workflow: Login Automation Tests
# File location: .github/workflows/login-tests.yml
# ============================================================

name: 🧪 Login Automation Tests

# ─── WHEN to run this workflow ──────────────────────────────
on:
  push:
    branches:
      - main          # Run when you push code to main branch
      - develop       # Run when you push to develop branch
  pull_request:
    branches:
      - main          # Run when someone creates a Pull Request to main
  workflow_dispatch:  # ✅ Also allows you to run it MANUALLY from GitHub UI

# ─── JOBS (steps to execute) ────────────────────────────────
jobs:
  login-tests:
    name: Run Login Tests
    runs-on: ubuntu-latest   # Use GitHub's Ubuntu cloud machine

    steps:

      # STEP 1: Download your code onto the cloud machine
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # STEP 2: Set up Node.js (Playwright needs Node)
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # STEP 3: Install your project dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # STEP 4: Install Playwright browsers (Chromium, Firefox, etc.)
      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # STEP 5: Run your login test cases
      - name: 🧪 Run Login Tests
        run: npx playwright test tests/login.test.js
        env:
          # 🔐 These come from GitHub Secrets (never hardcode passwords!)
          APP_URL: ${{ secrets.APP_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # STEP 6: Upload test report (so you can view results)
      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7   # Keep report for 7 days
